<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Legends Match</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <div class="d-flex flex-column align-items-center">
      <div class="hero-badge">⚔️ Season Stats Goes To IMO S40</div>
      <h1 class="hero-title mt-3">BATTLE REPORT TRIO MABAR</h1>
      <p class="hero-subtitle">Mobile Legends Bang Bang</p>
    </div>
  </div>
</section>

<!-- STATS SUMMARY -->
<section class="stat-section">
  <div class="container">
    <div class="row g-3 mb-4">
      <div class="col-4">
        <div class="stat-card win-card">
          <div class="stat-icon">🏆</div>
          <div class="stat-label">Victory</div>
          <div class="stat-value win-val" id="totalWin">0</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card lose-card">
          <div class="stat-icon">💀</div>
          <div class="stat-label">Defeat</div>
          <div class="stat-value lose-val" id="totalLose">0</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card rate-card">
          <div class="stat-icon">📊</div>
          <div class="stat-label">Win Rate</div>
          <div class="stat-value rate-val" id="winRate">0%</div>
        </div>
      </div>
    </div>

    <!-- WINRATE BAR -->
    <div class="winrate-bar-wrap">
      <div class="bar-labels">
        <span class="bar-win-label">WIN <span id="barWinPct">0%</span></span>
        <span class="bar-lose-label">LOSE <span id="barLosePct">0%</span></span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill" style="width:0%"></div>
      </div>
    </div>
  </div>
</section>

<!-- MATCH LIST -->
<section class="matches-section">
  <div class="container">
    <div class="section-title">Match History</div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <button class="filter-btn active-all" onclick="setFilter('all', this)">🎮 Semua</button>
      <button class="filter-btn" onclick="setFilter('win', this)">🏆 Win</button>
      <button class="filter-btn" onclick="setFilter('lose', this)">💀 Lose</button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Cari hero / MVP..." oninput="renderList()">
      </div>
      <select class="sort-select" id="sortSelect" onchange="renderList()">
        <option value="default">Urutkan: Default</option>
        <option value="win-first">Win Dulu</option>
        <option value="lose-first">Lose Dulu</option>
        <option value="hero-az">Hero A–Z</option>
        <option value="duration-asc">Durasi ↑</option>
        <option value="duration-desc">Durasi ↓</option>
      </select>
    </div>

    <div class="match-count" id="matchCount"></div>
    <div id="matchList"></div>

    <!-- PAGINATION -->
    <div class="pagination-wrap" id="paginationWrap">
      <div class="per-page-wrap">
        Tampilkan
        <select class="per-page-select" id="perPageSelect" onchange="changePerPage()">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="10">10</option>
          <option value="20">20</option>
        </select>
        per halaman
      </div>
      <div class="page-info" id="pageInfo"></div>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    KING BOTAK GOES TO IMO 🎮
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
